name: Skill integrity

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-odai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate canonical skill
        run: node scripts/validate-odai-skill.mjs
      - name: Check maintenance scripts
        run: |
          node --check scripts/validate-odai-skill.mjs
          node --check scripts/odai-canary-harness.mjs
          node --check cli/scripts/package-skill-bundle.mjs
      - name: Build frozen full and A/B fixtures
        run: |
          node scripts/odai-canary-harness.mjs --plan plans/odai-canary.md --out /tmp/odai-full-dry-run
          node scripts/odai-canary-harness.mjs --plan plans/odai-ab-smoke.md --out /tmp/odai-ab-dry-run
      - name: Test CLI
        run: npm --prefix cli test
      - name: Verify packaged skill bundle
        run: |
          npm --prefix cli run pack:dry-run
          test ! -e cli/skills
